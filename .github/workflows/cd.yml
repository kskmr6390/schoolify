name: CD — Deploy to VPS

on:
  # Auto-deploy after CI passes on master
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [master]
    types: [completed]

  # Manual trigger with optional migration step
  workflow_dispatch:
    inputs:
      migrate:
        description: 'Run DB migrations after deploy?'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Write the SSH private key ────────────────────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── Copy docker-compose.prod.yml to VPS ─────────────────────────────────
      - name: Sync docker-compose.prod.yml
        run: |
          ssh root@${{ secrets.VPS_HOST }} "mkdir -p /opt/schoolify/faiss_indexes"
          scp docker/docker-compose.prod.yml root@${{ secrets.VPS_HOST }}:/opt/schoolify/docker-compose.prod.yml

      # ── Pull latest images & restart ────────────────────────────────────────
      - name: Pull & restart services
        run: |
          ssh root@${{ secrets.VPS_HOST }} bash -s <<'EOF'
            set -e
            cd /opt/schoolify
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
          EOF

      # ── Run DB migrations (optional) ────────────────────────────────────────
      - name: Run DB migrations
        if: github.event.inputs.migrate == 'true'
        run: |
          ssh root@${{ secrets.VPS_HOST }} \
            "docker exec schoolify-api-gateway python -m alembic upgrade head"

      # ── Health check ────────────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 15
          ssh root@${{ secrets.VPS_HOST }} \
            "docker compose -f /opt/schoolify/docker-compose.prod.yml ps --format 'table {{.Name}}\t{{.Status}}'"
