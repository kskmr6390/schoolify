name: CD — Deploy to VPS

on:
  # Auto-deploy after CI passes on master
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [master]
    types: [completed]

  # Manual trigger with optional fixture loading
  workflow_dispatch:
    inputs:
      load_fixtures:
        description: 'Seed fixture data after deploy? (analytics + sbm tenants)'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Write the SSH private key ────────────────────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── Copy config files to VPS ─────────────────────────────────────────────
      - name: Sync config files
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            mkdir -p /opt/schoolify/faiss_indexes
            rm -rf /opt/schoolify/prometheus.prod.yml
          "
          scp docker/docker-compose.prod.yml root@${{ secrets.VPS_HOST }}:/opt/schoolify/docker-compose.prod.yml
          scp docker/prometheus.prod.yml root@${{ secrets.VPS_HOST }}:/opt/schoolify/prometheus.prod.yml

      # ── GHCR login on VPS ────────────────────────────────────────────────────
      - name: Login to GHCR on VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} \
            "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      # ── Pull latest images & restart ────────────────────────────────────────
      - name: Pull & restart services
        run: |
          ssh root@${{ secrets.VPS_HOST }} bash -s <<'EOF'
            set -e
            cd /opt/schoolify
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
          EOF

      # ── Run DB migrations (always) ───────────────────────────────────────────
      - name: Run DB migrations
        run: |
          ssh root@${{ secrets.VPS_HOST }} bash -s <<'EOF'
            set -e
            source /opt/schoolify/.env
            docker pull ghcr.io/kskmr6390/schoolify/migrations:latest
            docker run --rm \
              -e DATABASE_URL="$DATABASE_URL" \
              -e SECRET_KEY="${SECRET_KEY:-changeme}" \
              ghcr.io/kskmr6390/schoolify/migrations:latest
          EOF

      # ── Load fixtures (optional — workflow_dispatch only) ────────────────────
      - name: Copy seed scripts to VPS
        if: github.event.inputs.load_fixtures == 'true'
        run: |
          ssh root@${{ secrets.VPS_HOST }} "mkdir -p /opt/schoolify/scripts"
          scp scripts/seed_analytics.py root@${{ secrets.VPS_HOST }}:/opt/schoolify/scripts/seed_analytics.py
          scp scripts/seed_sbm.py       root@${{ secrets.VPS_HOST }}:/opt/schoolify/scripts/seed_sbm.py

      - name: Load fixtures
        if: github.event.inputs.load_fixtures == 'true'
        run: |
          ssh root@${{ secrets.VPS_HOST }} bash -s <<'EOF'
            set -e
            source /opt/schoolify/.env
            cd /opt/schoolify
            pip3 install --quiet psycopg2-binary bcrypt 2>/dev/null || true
            echo "→ Seeding analytics data..."
            DATABASE_URL="$DATABASE_URL" python3 scripts/seed_analytics.py
            echo "→ Seeding SBM fixtures..."
            DATABASE_URL="$DATABASE_URL" python3 scripts/seed_sbm.py
            echo "✓ Fixtures loaded"
          EOF

      # ── Health check ────────────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 15
          ssh root@${{ secrets.VPS_HOST }} \
            "docker compose -f /opt/schoolify/docker-compose.prod.yml ps --format 'table {{.Name}}\t{{.Status}}'"
