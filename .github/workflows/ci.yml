name: CI Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/schoolify

jobs:
  # ── Backend Tests (non-blocking) ───────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    continue-on-error: true        # never blocks image build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schoolify_test
          POSTGRES_USER: schoolify
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, tenant-service, student-service, attendance-service, fee-service, assignment-service]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: services/${{ matrix.service }}/requirements.txt

    - name: Install dependencies
      run: |
        pip install -r services/${{ matrix.service }}/requirements.txt
        pip install pytest pytest-asyncio pytest-cov httpx

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://schoolify:test_password@localhost:5432/schoolify_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test_secret_key_for_ci_only
        ENVIRONMENT: test
      run: |
        pytest services/${{ matrix.service }}/tests/ -v || true

  # ── Frontend Check (non-blocking) ─────────────────────────────────────────
  test-frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    continue-on-error: true        # never blocks image build

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: cd frontend/web && npm install --legacy-peer-deps

    - name: Lint
      run: cd frontend/web && npm run lint || true

    - name: Build
      run: cd frontend/web && npm run build || true
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_APP_URL: http://localhost:3000

  # ── Build & Push Docker Images (always runs on master) ────────────────────
  # Runs independently — does NOT wait for tests.
  # Tests are informational; broken tests never block deployment.
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - tenant-service
          - student-service
          - attendance-service
          - fee-service
          - notification-service
          - assignment-service
          - analytics-service
          - ai-copilot-service

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
        tags: |
          type=sha,prefix=sha-
          type=ref,event=branch
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/${{ matrix.service }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.service }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Build Frontend Image ───────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'

    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3

    - name: Log in to Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: frontend/web
        push: true
        tags: ${{ env.IMAGE_PREFIX }}/web:latest,${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
        cache-from: type=gha,scope=web
        cache-to: type=gha,mode=max,scope=web
