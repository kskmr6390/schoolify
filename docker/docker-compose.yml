# Production-ready docker-compose for local development and staging
# For production, use Kubernetes manifests in infra/k8s/

networks:
  schoolify-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  minio_data:
  grafana_data:
  ollama_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: schoolify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: schoolify
      POSTGRES_USER: schoolify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-schoolify_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolify -d schoolify"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schoolify-net

  redis:
    image: redis:7-alpine
    container_name: schoolify-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schoolify-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: schoolify-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - schoolify-net

  minio:
    image: minio/minio:latest
    container_name: schoolify-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - schoolify-net

  # ── Microservices ───────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    container_name: schoolify-api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://schoolify:${POSTGRES_PASSWORD:-schoolify_dev_password}@postgres:5432/schoolify
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      ENVIRONMENT: development
      DEBUG: "true"
      AUTH_SERVICE_URL: http://auth-service:8001
      TENANT_SERVICE_URL: http://tenant-service:8002
      USER_SERVICE_URL: http://user-service:8003
      STUDENT_SERVICE_URL: http://student-service:8004
      ATTENDANCE_SERVICE_URL: http://attendance-service:8005
      FEE_SERVICE_URL: http://fee-service:8006
      NOTIFICATION_SERVICE_URL: http://notification-service:8007
      ASSIGNMENT_SERVICE_URL: http://assignment-service:8008
      ANALYTICS_SERVICE_URL: http://analytics-service:8009
      AI_COPILOT_SERVICE_URL: http://ai-copilot-service:8010
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
    volumes:
      - ../services/api-gateway:/app/services/api_gateway
      - ../services/shared:/app/services/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - schoolify-net

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: schoolify-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment: &common-env
      DATABASE_URL: postgresql+asyncpg://schoolify:${POSTGRES_PASSWORD:-schoolify_dev_password}@postgres:5432/schoolify
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      ENVIRONMENT: development
      DEBUG: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      FROM_EMAIL: noreply@schoolify.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - schoolify-net

  tenant-service:
    build:
      context: ..
      dockerfile: services/tenant-service/Dockerfile
    container_name: schoolify-tenant
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - schoolify-net

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    container_name: schoolify-user
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment: *common-env
    volumes:
      - ../services/user-service:/app/services/user_service
      - ../services/shared:/app/services/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - schoolify-net

  student-service:
    build:
      context: ..
      dockerfile: services/student-service/Dockerfile
    container_name: schoolify-student
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      S3_BUCKET: schoolify-uploads
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - schoolify-net

  attendance-service:
    build:
      context: ..
      dockerfile: services/attendance-service/Dockerfile
    container_name: schoolify-attendance
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment: *common-env
    volumes:
      - ../services/attendance-service:/app/services/attendance_service
      - ../services/shared:/app/services/shared
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - schoolify-net

  fee-service:
    build:
      context: ..
      dockerfile: services/fee-service/Dockerfile
    container_name: schoolify-fee
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - schoolify-net

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    container_name: schoolify-notification
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      <<: *common-env
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - schoolify-net

  assignment-service:
    build:
      context: ..
      dockerfile: services/assignment-service/Dockerfile
    container_name: schoolify-assignment
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - schoolify-net

  analytics-service:
    build:
      context: ..
      dockerfile: services/analytics-service/Dockerfile
    container_name: schoolify-analytics
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment: *common-env
    volumes:
      - ../services/analytics-service:/app/services/analytics_service
      - ../services/shared:/app/services/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - schoolify-net

  ollama:
    image: ollama/ollama:latest
    container_name: schoolify-ollama
    restart: unless-stopped
    # Models are pulled on-demand by the ai-copilot-service (no hardcoded model).
    entrypoint: ["/bin/sh", "-c", "ollama serve"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    networks:
      - schoolify-net

  ai-copilot-service:
    build:
      context: ..
      dockerfile: services/ai-copilot-service/Dockerfile
    container_name: schoolify-ai-copilot
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      <<: *common-env
      LLM_TYPE: ${LLM_TYPE:-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://ollama:11434}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-tinyllama-1.1b}
      FAISS_STORE_DIR: /app/faiss_indexes
    volumes:
      - ./faiss_indexes:/app/faiss_indexes
      - ../services/ai-copilot-service:/app/services/ai_copilot_service
      - ../services/shared:/app/services/shared
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - schoolify-net

  # ── Frontend ────────────────────────────────────────────────────────────────

  web:
    build:
      context: ../frontend/web
      dockerfile: Dockerfile
    container_name: schoolify-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ../frontend/web/src:/app/src
      - ../frontend/web/public:/app/public
    depends_on:
      - api-gateway
    networks:
      - schoolify-net

  # ── Monitoring ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: schoolify-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - schoolify-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: schoolify-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - schoolify-net

  # ── Development Tools ───────────────────────────────────────────────────────

  mailhog:
    image: axllent/mailpit:latest
    container_name: schoolify-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - schoolify-net

  nginx:
    image: nginx:1.25-alpine
    container_name: schoolify-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - web
    networks:
      - schoolify-net
