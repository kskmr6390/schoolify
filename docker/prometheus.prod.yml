global:
  scrape_interval:     30s
  evaluation_interval: 30s
  external_labels:
    env: production

# Ship metrics to Grafana Cloud free tier
# Set GRAFANA_PROMETHEUS_URL and GRAFANA_API_KEY in /opt/schoolify/.env
remote_write:
  - url: "${GRAFANA_PROMETHEUS_URL}"
    basic_auth:
      username: ""          # Grafana Cloud uses API key as password, username is your stack ID
      password: "${GRAFANA_API_KEY}"
    queue_config:
      max_samples_per_send: 1000
      max_shards: 5

scrape_configs:
  - job_name: schoolify-services
    static_configs:
      - targets:
          - api-gateway:8000
          - auth-service:8001
          - tenant-service:8002
          - user-service:8003
          - student-service:8004
          - attendance-service:8005
          - fee-service:8006
          - notification-service:8007
          - assignment-service:8008
          - analytics-service:8009
          - ai-copilot-service:8010
    metrics_path: /metrics
    scrape_interval: 30s
