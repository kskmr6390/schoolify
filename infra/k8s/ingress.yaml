apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: schoolify-ingress
  namespace: schoolify-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "60"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.schoolify.com"
spec:
  tls:
  - hosts:
    - "*.schoolify.com"
    - schoolify.com
    secretName: schoolify-tls
  rules:
  # API Gateway (all subdomains route to same API)
  - host: "api.schoolify.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
  # Frontend app
  - host: "app.schoolify.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-frontend
            port:
              number: 3000
  # Wildcard: {tenant-slug}.schoolify.com → frontend
  - host: "*.schoolify.com"
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-frontend
            port:
              number: 3000
