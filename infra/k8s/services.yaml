---
# AI Copilot Service
apiVersion: v1
kind: Service
metadata:
  name: ai-copilot-service
  namespace: schoolify-prod
spec:
  selector:
    app: ai-copilot-service
  ports:
    - port: 8010
      targetPort: 8010
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-copilot-service
  namespace: schoolify-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-copilot-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-copilot-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ai-copilot-service
          image: ghcr.io/YOUR_ORG/schoolify/ai-copilot-service:latest
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: schoolify-config
            - secretRef:
                name: schoolify-secrets
          volumeMounts:
            - name: faiss-data
              mountPath: /data/faiss_indexes
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: faiss-data
          persistentVolumeClaim:
            claimName: faiss-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faiss-pvc
  namespace: schoolify-prod
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc  # AWS EFS CSI driver for shared storage across replicas
  resources:
    requests:
      storage: 10Gi
