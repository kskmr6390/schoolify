# IMPORTANT: In production, use External Secrets Operator with AWS Secrets Manager
# This file is a template — never commit real secrets to git.
# Values must be base64 encoded: echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: schoolify-secrets
  namespace: schoolify-prod
type: Opaque
data:
  # Replace with: echo -n "your-actual-value" | base64
  SECRET_KEY: CHANGE_ME_BASE64
  DATABASE_URL: CHANGE_ME_BASE64
  REDIS_URL: CHANGE_ME_BASE64
  GOOGLE_CLIENT_SECRET: CHANGE_ME_BASE64
  SMTP_PASSWORD: CHANGE_ME_BASE64
  TWILIO_AUTH_TOKEN: CHANGE_ME_BASE64
  ANTHROPIC_API_KEY: CHANGE_ME_BASE64
