<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Schoolify — Mobile Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, sans-serif;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .label {
      color: #94a3b8;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Phone shell */
    .phone {
      width: 393px;
      background: #0f172a;
      border-radius: 54px;
      padding: 14px;
      box-shadow:
        0 0 0 1px #334155,
        0 25px 60px rgba(0,0,0,0.7),
        inset 0 0 0 1px #1e293b;
      position: relative;
    }

    /* Dynamic island */
    .phone::before {
      content: '';
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #0f172a;
      border-radius: 20px;
      z-index: 10;
    }

    /* Side buttons */
    .phone::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 120px;
      width: 3px;
      height: 80px;
      background: #1e293b;
      border-radius: 0 2px 2px 0;
      box-shadow: 0 100px 0 #1e293b, 0 -120px 0 #1e293b, 0 -160px 0 #1e293b;
    }

    .screen {
      width: 100%;
      height: 852px;
      border-radius: 44px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="scene">
    <span class="label">Schoolify — Mobile Preview</span>
    <div class="phone">
      <div class="screen">
        <iframe
          src="http://localhost:8081"
          title="Schoolify Mobile App"
          allow="same-origin"
        ></iframe>
      </div>
    </div>
  </div>
</body>
</html>
